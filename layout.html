<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhabov's website</title>
    <link href="tampung.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head> 
<body>
    <script src="script.js"></script>
    <div class="header">
        <a onclick="changeContent('home')" class="logo">DHABOAV</a>
        <button class="menu-button"><i class='bx bx-menu'></i></button>
    </div>
    <div class="container">
        <div class="links">
            <a onclick="changeContent('home')">
                <span class="link-box">
                    <i class='bx bxs-home-alt-2'></i>
                    <p>Home</p>
                </span>
            </a>
            <a onclick="changeContent('about')">
                <span class="link-box">
                    <i class='bx bxs-info-circle'></i>
                    <p>About</p>
                </span>
            </a>
            <a onclick="changeContent('skills')">
                <span class="link-box">
                    <i class='bx bxs-cog'></i>
                    <p>Skills</p>
                </span>
            </a>
            <a onclick="changeContent('contacts')">
                <span class="link-box">
                    <i class='bx bxs-contact'></i>
                    <p>Contact</p>
                </span>
            </a>
        </div>
        <div id="content-section"></div>
    </div>
</body>
</html>
